version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: auction_mysql
    environment:
      MYSQL_ROOT_PASSWORD: "1111"
      MYSQL_DATABASE: auction_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: auction_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: auction_backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql-db
      - redis
    environment:
      # Переопределяем ссылки на БД и Redis внутри сети Docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/auction_db?serverTimezone=UTC&characterEncoding=UTF-8
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379

  frontend:
    build:
      context: ./frontend
    container_name: auction_frontend
    ports:
      - "3000:80" # Фронтенд будет доступен на порту 3000
    depends_on:
      - backend

volumes:
  mysql_data: