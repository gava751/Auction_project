version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: auction_mysql
    environment:
      # Пароль для root задается ТОЛЬКО этой переменной
      MYSQL_ROOT_PASSWORD: "1111"
      MYSQL_DATABASE: auction_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: auction_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data: