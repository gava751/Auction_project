spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: YOUR_GOOGLE_CLIENT_ID # Нужно создать в Google Cloud Console
            client-secret: YOUR_GOOGLE_CLIENT_SECRET
            scope:
              - email
              - profile
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
  datasource:
    url: jdbc:mysql://localhost:3306/auction_db?createDatabaseIfNotExist=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: "1111" # Кавычки гарантируют, что пароль прочитается как строка
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970 # Сгенерируйте свою строку 64+ символа
      expiration: 86400000 # 1 день (мс)
      refresh-token:
        expiration: 604800000 # 7 дней (мс)